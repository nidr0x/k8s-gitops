---
name: Lint

on: # yamllint disable-line rule:truthy
  push:
    paths:
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - ".taskfiles/**"
      - ".sops.yaml"
      - "Taskfile.yaml"
      - "argocd/**"
      - "kubernetes/**"
      - "renovate.json5"
      - "talos/**"
      - "terraform/**"
      - "tofu/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - ".taskfiles/**"
      - ".sops.yaml"
      - "Taskfile.yaml"
      - "argocd/**"
      - "kubernetes/**"
      - "renovate.json5"
      - "talos/**"
      - "terraform/**"
      - "tofu/**"
permissions: {}

concurrency:
  group: lint-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Super-linter
        uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41 # v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          VALIDATE_CHECKOV: false
          VALIDATE_EDITORCONFIG: false
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          VALIDATE_GITLEAKS: false
          VALIDATE_GO_RELEASER: false
          VALIDATE_JSCPD: false
          VALIDATE_KUBERNETES_KUBECONFORM: false
          VALIDATE_MARKDOWN: false
          VALIDATE_TRIVY: false
          VALIDATE_SPELL_CODESPELL: false
