namespaceOverride: openwebui

fullnameOverride: openwebui

ollama:
  enabled: false

pipelines:
  enabled: false

websocket:
  enabled: false
  redis:
    enabled: false

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 2Gi

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  timeoutSeconds: 3
  periodSeconds: 5
  successThreshold: 1
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  timeoutSeconds: 3
  periodSeconds: 10
  successThreshold: 1
  failureThreshold: 30

readinessProbe:
  httpGet:
    path: /health/db
    port: http
  initialDelaySeconds: 0
  timeoutSeconds: 3
  periodSeconds: 5
  successThreshold: 1
  failureThreshold: 12

persistence:
  enabled: true
  size: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClass: proxmox-k8s-zfs

route:
  enabled: true
  apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  annotations:
    external-dns.alpha.kubernetes.io/target: ip.nidr0x.win
  hostnames:
    - openwebui.nidr0x.win
  parentRefs:
    - name: external
      namespace: gateway
      sectionName: https-gateway
    - name: internal
      namespace: gateway
      sectionName: https-gateway

openaiApiKey: ""

extraEnvVars:
  - name: TZ
    value: "Europe/Madrid"
  - name: WEBUI_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: openwebui
        key: WEBUI_SECRET_KEY
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: openwebui-database-app
        key: uri
  - name: UVICORN_WORKERS
    value: "1"
