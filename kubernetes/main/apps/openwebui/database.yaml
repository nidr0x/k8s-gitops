apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: openwebui-database
  namespace: openwebui
spec:
  env:
    - name: TZ
      value: UTC
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-bookworm

  postgresql:
    parameters:
      max_wal_size: "512MB"
      min_wal_size: "128MB"
      archive_timeout: "10min"
      checkpoint_timeout: "15min"
      checkpoint_completion_target: "0.9"
      wal_keep_size: "256MB"

  bootstrap:
    initdb:
      database: openwebui
      owner: openwebui

  backup:
    barmanObjectStore:
      destinationPath: s3://nidr0x-homelab-backups/cloudnative-pg
      endpointURL: https://de6356c843cfe00a0c3ff3b669892ca9.r2.cloudflarestorage.com
      serverName: openwebui-database-v1
      s3Credentials:
        accessKeyId:
          name: openwebui
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: openwebui
          key: SECRET_ACCESS_KEY
      data:
        compression: bzip2
        encryption: AES256
      wal:
        compression: bzip2
        maxParallel: 4
        encryption: AES256
    retentionPolicy: "7d"

  logLevel: info
  primaryUpdateStrategy: unsupervised

  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      storageClassName: proxmox-k8s-zfs

  walStorage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 512Mi
      storageClassName: proxmox-k8s-zfs

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      memory: "256Mi"
      cpu: "128m"
    limits:
      memory: "768Mi"
---
apiVersion: postgresql.cnpg.io/v1
kind: Backup
metadata:
  name: openwebui
  namespace: openwebui
spec:
  cluster:
    name: openwebui-database
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: openwebui-backup
  namespace: openwebui
spec:
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: openwebui-database
