apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  labels:
    alerts.nidr0x.win/enabled: "true"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
        alerts.nidr0x.win/enabled: "true"
    spec:
      terminationGracePeriodSeconds: 90
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      securityContext:
        fsGroup: 988
        fsGroupChangePolicy: "OnRootMismatch"
      initContainers:
        - name: check-config
          image: homeassistant/home-assistant:2026.7
          imagePullPolicy: Always
          command:
            - python
            - -m
            - homeassistant
            - --script
            - check_config
            - --config
            - /config
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          env:
            - name: TZ
              value: "Europe/Madrid"
          volumeMounts:
            - name: homeassistant-config
              mountPath: /config
            - name: homeassistant-config-file
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
      containers:
        - name: homeassistant
          image: homeassistant/home-assistant:2026.7
          imagePullPolicy: Always
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          env:
            - name: TZ
              value: "Europe/Madrid"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          ports:
            - name: http
              protocol: TCP
              containerPort: 8123
          volumeMounts:
            - name: homeassistant-config
              mountPath: /config
            - name: homeassistant-config-file
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0
            timeoutSeconds: 3
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 30
      volumes:
        - name: homeassistant-config
          persistentVolumeClaim:
            claimName: homeassistant-config-pvc
        - name: homeassistant-config-file
          configMap:
            name: homeassistant-configmap
