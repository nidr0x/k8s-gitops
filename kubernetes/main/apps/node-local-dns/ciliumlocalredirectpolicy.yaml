apiVersion: cilium.io/v2
kind: CiliumLocalRedirectPolicy
metadata:
  name: node-local-dns
  namespace: kube-system
spec:
  redirectFrontend:
    serviceMatcher:
      serviceName: kube-dns
      namespace: kube-system
  redirectBackend:
    localEndpointSelector:
      matchLabels:
        app.kubernetes.io/name: node-local-dns
    toPorts:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
