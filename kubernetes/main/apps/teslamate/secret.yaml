apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teslamate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api

  target:
    name: teslamate

  data:
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: TESLAMATE_ENCRYPTION_KEY
    - secretKey: DATABASE_PASS
      remoteRef:
        key: TESLAMATE_POSTGRESQL_PASSWORD
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: CLOUDNATIVEPG_BACKUP_ACCESS_KEY_ID
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: CLOUDNATIVEPG_BACKUP_SECRET_ACCESS_KEY
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teslamate-database-superuser
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api

  target:
    name: teslamate-database-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: postgres
        password: "{{ .TESLAMATE_POSTGRESQL_PASSWORD }}"

  data:
    - secretKey: TESLAMATE_POSTGRESQL_PASSWORD
      remoteRef:
        key: TESLAMATE_POSTGRESQL_PASSWORD
