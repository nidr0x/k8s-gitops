apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-database
  namespace: n8n
spec:
  env:
    - name: TZ
      value: UTC
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-minimal-trixie

  postgresql:
    parameters:
      max_wal_size: "512MB"
      min_wal_size: "128MB"
      archive_timeout: "10min"
      checkpoint_timeout: "15min"
      checkpoint_completion_target: "0.9"
      wal_keep_size: "256MB"

  bootstrap:
    initdb:
      database: n8n
      owner: n8n

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: n8n-database
        serverName: n8n-database-v1

  logLevel: info
  primaryUpdateStrategy: unsupervised

  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
      storageClassName: proxmox-k8s-lvm

  walStorage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 4Gi
      storageClassName: proxmox-k8s-lvm

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      memory: "256Mi"
      cpu: "128m"
    limits:
      memory: "768Mi"
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: n8n-database
  namespace: n8n
spec:
  configuration:
    destinationPath: s3://nidr0x-homelab-backups/cloudnative-pg
    endpointURL: https://de6356c843cfe00a0c3ff3b669892ca9.r2.cloudflarestorage.com
    s3Credentials:
      accessKeyId:
        name: n8n
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: n8n
        key: SECRET_ACCESS_KEY
    data:
      compression: bzip2
      encryption: AES256
    wal:
      compression: bzip2
      maxParallel: 4
      encryption: AES256
  retentionPolicy: "7d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-backup
  namespace: n8n
spec:
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: n8n-database
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
