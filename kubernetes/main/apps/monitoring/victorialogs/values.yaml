nameOverride: "victorialogs"

server:
  retentionPeriod: "7d"
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClassName: "nfs"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      memory: "1Gi"
  extraArgs:
    http.pathPrefix: /victorialogs
  ingress:
    enabled: false
    hosts:
      - name: monitoring.nidr0x.win
        path:
          - /victorialogs
    pathType: Prefix
    tls:
      - hosts:
          - monitoring.nidr0x.win
vector:
  enabled: true
  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 512Mi
  customConfig:
    sources:
      k8s:
        # Avoid replaying a large backlog after Vector or the API server recovers.
        read_from: end
        ignore_older_secs: 86400
        oldest_first: false
        rotate_wait_secs: 300
        # Namespace metadata is not needed by the current VictoriaLogs queries.
        insert_namespace_fields: false
        use_apiserver_cache: true
