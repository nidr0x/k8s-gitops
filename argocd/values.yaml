fullnameOverride: argocd

repoServer:
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: bootstrap.argocd/enabled
                operator: In
                values:
                  - "true"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 85
    targetMemoryUtilizationPercentage: 85
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

controller:
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: bootstrap.argocd/enabled
                operator: In
                values:
                  - "true"
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 500m
      memory: 3Gi

server:
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: bootstrap.argocd/enabled
                operator: In
                values:
                  - "true"
  ingress:
    enabled: true
    https: false
    ingressClassName: "cilium"
    annotations:
      cert-manager.io/cluster-issuer: zerossl-prod
      external-dns.alpha.kubernetes.io/target: ip.nidr0x.win
    hostname: argocd.nidr0x.win
    extraTls:
      - hosts:
          - argocd.nidr0x.win
  service:
    type: LoadBalancer

  autoscaling:
    enabled: true
    minReplicas: 2
    targetCPUUtilizationPercentage: 65
    targetMemoryUtilizationPercentage: 65
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

global:
  domain: argocd.nidr0x.win

dex:
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: bootstrap.argocd/enabled
                operator: In
                values:
                  - "true"

redis:
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: bootstrap.argocd/enabled
                operator: In
                values:
                  - "true"

configs:
  params:
    server.insecure: true
    controller.status.processors: 10
    controller.operation.processors: 5
  rbac:
    policy.default: ""
    scopes: "[email, group]"
    policy.csv: |
      g, nidr0x@gmail.com, role:admin
  cm:
    admin.enabled: false
    url: https://argocd.nidr0x.win
    statusbadge.enabled: false
    resource.exclusions: |
      - apiGroups:
          - cilium.io
        kinds:
          - CiliumIdentity
        clusters:
          - "*"
    dex.config: |
      connectors:
        - type: oidc
          id: google
          name: Google
          config:
            issuer: https://accounts.google.com
            clientID: $sso:dex.google.clientID
            clientSecret: $sso:dex.google.clientSecret

    # Adding Applications health check
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      if hs.status == "Suspended" then
        hs.status = "Healthy"
      end
      return hs
    resource.customizations.health.postgresql.cnpg.io_Cluster: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.phase ~= nil then
          hs.message = obj.status.phase
        end
        if obj.status.conditions ~= nil then
          for _, condition in ipairs(obj.status.conditions) do
            if condition.type == "Ready" then
              if condition.status == "True" then
                hs.status = "Healthy"
              elseif condition.status == "False" then
                hs.status = "Degraded"
              end
              if condition.message ~= nil and condition.message ~= "" then
                hs.message = condition.message
              end
              return hs
            end
          end
        end
      end
      return hs
    resource.customizations.health.postgresql.cnpg.io_Backup: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.phase ~= nil then
          hs.message = obj.status.phase
          if obj.status.phase == "completed" or obj.status.phase == "Completed" then
            hs.status = "Healthy"
          elseif obj.status.phase == "failed" or obj.status.phase == "Failed" then
            hs.status = "Degraded"
          end
        end
      end
      return hs
    resource.customizations.health.postgresql.cnpg.io_ScheduledBackup: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.nextScheduleTime ~= nil and obj.status.nextScheduleTime ~= "" then
          hs.status = "Healthy"
          hs.message = "Next schedule: " .. obj.status.nextScheduleTime
        elseif obj.status.lastCheckTime ~= nil and obj.status.lastCheckTime ~= "" then
          hs.status = "Healthy"
          hs.message = "Last check: " .. obj.status.lastCheckTime
        end
      end
      return hs
    resource.customizations.health.external-secrets.io_ExternalSecret: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil and obj.status.conditions ~= nil then
        for _, condition in ipairs(obj.status.conditions) do
          if condition.type == "Ready" then
            if condition.status == "True" then
              hs.status = "Healthy"
            elseif condition.status == "False" then
              hs.status = "Degraded"
            end
            if condition.message ~= nil and condition.message ~= "" then
              hs.message = condition.message
            end
            return hs
          end
        end
      end
      return hs
    resource.customizations.health.gateway.networking.k8s.io_HTTPRoute: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil and obj.status.parents ~= nil then
        local accepted = false
        local resolved = false
        for _, parent in ipairs(obj.status.parents) do
          if parent.conditions ~= nil then
            for _, condition in ipairs(parent.conditions) do
              if condition.type == "Accepted" and condition.status == "True" then
                accepted = true
              end
              if condition.type == "ResolvedRefs" and condition.status == "True" then
                resolved = true
              end
              if condition.status == "False" and condition.message ~= nil and condition.message ~= "" then
                hs.status = "Degraded"
                hs.message = condition.message
                return hs
              end
            end
          end
        end
        if accepted and resolved then
          hs.status = "Healthy"
          hs.message = "Route accepted"
        end
      end
      return hs

    resource.customizations.ignoreDifferences.all: |+
      jqPathExpressions:
      - '.metadata.labels."helm.sh/chart"'
      - '.metadata.annotations."deployment.kubernetes.io/revision"'
    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret:
      |+
      jqPathExpressions:
      - '.metadata.finalizers'
      - '.spec.refreshInterval'
      - '.spec.target.creationPolicy'
      - '.spec.target.deletionPolicy'
      - '.spec.data[].remoteRef.conversionStrategy'
      - '.spec.data[].remoteRef.decodingStrategy'
      - '.spec.data[].remoteRef.metadataPolicy'
      - '.spec.data[].remoteRef.nullBytePolicy'
      - '.status'
    resource.customizations.ignoreDifferences.cert-manager.io_Certificate: |+
      jqPathExpressions:
      - '.status'
    resource.customizations.ignoreDifferences.cert-manager.io_ClusterIssuer: |+
      jqPathExpressions:
      - '.status'
