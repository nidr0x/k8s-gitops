apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  project: everest
  sources:
    - repoURL: https://github.com/nidr0x/k8s-gitops
      targetRevision: master
      ref: nidr0x-k8s-gitops
    - repoURL: https://charts.jetstack.io
      targetRevision: v1.20.2
      chart: cert-manager
      helm:
        valueFiles:
          - $nidr0x-k8s-gitops/kubernetes/main/apps/cert-manager/values.yaml
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    automated:
      prune: false
      selfHeal: false
  ignoreDifferences:
    - group: cert-manager.io
      kind: Certificate
      jqPathExpressions:
        - .status
    - group: cert-manager.io
      kind: ClusterIssuer
      jqPathExpressions:
        - .status
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.finalizers
        - .spec.refreshInterval
        - .spec.target.creationPolicy
        - .spec.target.deletionPolicy
        - .spec.data[]?.remoteRef.conversionStrategy
        - .spec.data[]?.remoteRef.decodingStrategy
        - .spec.data[]?.remoteRef.metadataPolicy
        - .spec.data[]?.remoteRef.nullBytePolicy
        - .status
    - group: ""
      kind: Secret
      name: cert-manager-webhook-ca
      namespace: cert-manager
      jsonPointers:
        - /data
