apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
spec:
  destination:
    namespace: n8n
    server: https://kubernetes.default.svc
  project: everest
  sources:
    - repoURL: https://github.com/nidr0x/k8s-gitops
      targetRevision: master
      ref: nidr0x-k8s-gitops
    - repoURL: https://github.com/nidr0x/k8s-gitops
      targetRevision: master
      path: kubernetes/main/apps/n8n/
    - repoURL: https://community-charts.github.io/helm-charts
      targetRevision: 1.16.38
      chart: n8n
      helm:
        valueFiles:
          - $nidr0x-k8s-gitops/kubernetes/main/apps/n8n/values.yaml
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
