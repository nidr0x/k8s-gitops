apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openwebui
spec:
  destination:
    namespace: openwebui
    server: https://kubernetes.default.svc
  project: everest
  sources:
    - repoURL: https://github.com/nidr0x/k8s-gitops
      targetRevision: master
      ref: nidr0x-k8s-gitops
    - repoURL: https://github.com/nidr0x/k8s-gitops
      targetRevision: master
      path: kubernetes/main/apps/openwebui/
    - repoURL: https://helm.openwebui.com
      targetRevision: 13.0.0
      chart: open-webui
      helm:
        valueFiles:
          - $nidr0x-k8s-gitops/kubernetes/main/apps/openwebui/values.yaml
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
