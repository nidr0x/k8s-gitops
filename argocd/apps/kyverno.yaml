apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
spec:
  destination:
    namespace: kyverno
    server: https://kubernetes.default.svc
  project: everest
  sources:
    - repoURL: https://github.com/nidr0x/k8s-gitops
      targetRevision: master
      ref: nidr0x-k8s-gitops
    - repoURL: https://github.com/nidr0x/k8s-gitops
      targetRevision: master
      path: kubernetes/main/apps/kyverno/
    - repoURL: https://kyverno.github.io/kyverno/
      targetRevision: 3.8.0
      chart: kyverno
      helm:
        valueFiles:
          - $nidr0x-k8s-gitops/kubernetes/main/apps/kyverno/values.yaml
    - repoURL: https://kyverno.github.io/kyverno/
      targetRevision: 3.7.2
      chart: kyverno-policies
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.labels
        - .spec.conversion
    - group: kyverno.io
      kind: ClusterPolicy
      jqPathExpressions:
        - .status
        - .spec.admission
        - .spec.emitWarning
        - .spec.rules[]?.context[]?.apiCall.method
        - .spec.rules[]?.skipBackgroundRequests
        - .spec.rules[]?.validate.allowExistingViolations
        - .spec.rules[]?.mutate.allowExistingViolations
        - .spec.rules[]?.verifyImages[]?.mutateDigest
