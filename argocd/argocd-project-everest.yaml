apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: everest
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Project for Everest
  destinations:
    - namespace: "*"
      name: "*"
      server: https://kubernetes.default.svc
  sourceRepos:
    - https://github.com/nidr0x/homelab
    - https://community-charts.github.io/helm-charts
    - https://github.com/cert-manager/cert-manager.git
    - https://github.com/nidr0x/k8s-gitops
    - https://cloudnative-pg.github.io/charts
    - https://helm.cilium.io
    - https://charts.jetstack.io
    - https://charts.external-secrets.io
    - https://kubernetes-sigs.github.io/external-dns/
    - https://kubernetes-sigs.github.io/metrics-server/
    - https://kyverno.github.io/kyverno/
    - https://victoriametrics.github.io/helm-charts
    - https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
    - ghcr.io/sergelogvinov/charts
    - https://github.com/kubernetes-sigs/gateway-api.git
    - https://stakater.github.io/stakater-charts
    - https://github.com/alex1989hu/kubelet-serving-cert-approver.git
    - ghcr.io/spegel-org/helm-charts
    - raw.githubusercontent.com/deliveryhero/helm-charts/refs/heads/master
    - https://raw.githubusercontent.com/deliveryhero/helm-charts/refs/heads/master
    - https://charts.deliveryhero.io/
    - https://helm.openwebui.com
    - https://argoproj.github.io/argo-helm
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
